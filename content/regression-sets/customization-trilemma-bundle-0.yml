  - id: p017
    label: Edge case — pseudocode answer, c2 + c3 met, c1 borderline (deliberate borderline)
    answer: |
      def customization_decision(problem):
          if problem.shape == 'behavior_shift':
              # Fine-tuning shifts default behavior;
              # RAG/prompting don't change defaults at scale.
              return Approach.FINE_TUNE
          elif problem.shape == 'knowledge_gap':
              # RAG retrieves missing facts per query;
              # training shifts behavior, doesn't load facts.
              return Approach.RAG
          elif problem.shape == 'spec_clarity':
              # Prompt instructions/examples carry the contract;
              # fine-tuning is overkill for spec problems.
              return Approach.PROMPT

