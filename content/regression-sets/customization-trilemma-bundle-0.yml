# Regression set for the Fine-tuning vs. Prompting vs. RAG unit
# (customization-trilemma-bundle-0).
#
# Unit 9 is treated as flagship under STRATEGY.md § T2 — target is
# >= 20 pairs before the unit publishes. Authoring discipline mirrors
# tokenization-bundle-0.yml + context-window-bundle-0.yml (the two
# Phase 2/3 gate-passing references).
#
# Position-to-criterion mapping (from
# content/units/customization-trilemma-bundle-0.md slot 8 rubric):
#
#   1. "Names the customization trilemma the unit is built around —
#      fine-tuning vs. RAG vs. prompting as three approaches that map
#      to three different problem shapes (behavior shift / knowledge
#      gap / spec clarity), not as interchangeable levers — AND treats
#      diagnosing the failure mode as the load-bearing step before
#      picking an approach."
#   2. "Identifies a concrete failure mode of mis-matching approach to
#      problem shape AND names the mechanism behind it — e.g.,
#      fine-tuning a knowledge gap because training shifts behavior
#      distribution rather than loading facts; RAG-ing a behavior issue
#      because retrieval injects content into context but doesn't
#      change how the model interprets it; prompting a knowledge gap
#      because no amount of instruction retrieves information the
#      model doesn't have."
#   3. "Distinguishes which approach is load-bearing for which problem
#      shape — fine-tuning for behavior/style/persona shifts; RAG for
#      knowledge gaps; prompting for spec-clarity problems — AND
#      recognizes that production features usually layer multiple
#      approaches (RAG + prompting as typical default)."
#
# Authoring distribution (21 pairs, 6/4/3/4/2/2):
#   * 6 pairs all-three-met (varied English voices)
#       p001, p002, p005, p016 (structured PM-doc), p018 (emoji),
#       p021 (concise)
#   * 4 pairs partial credit (2 of 3)
#       p006 (c1+c2), p007 (c1+c3), p008 (c2+c3), p017 (c2+c3, code)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2), p011 (c3)
#   * 4 pairs all-missed but on-topic
#       p004, p012, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013
#   * 2 pairs flagged-expected (too thin to grade fairly per T2-B)
#       p014, p015
#
# T2-B locked interpretation (per docs/PHASE_2_GATE.md and PR #72):
# flagged = grader *uncertainty*, NOT "answer is bad." Off-topic
# answers the grader can confidently grade as all Not-Met are
# gradable — flagged: false. Thin/punting answers the grader cannot
# fairly grade — flagged: true.
#
# Four deliberate-borderline pairs (mirrors Unit 2 pattern):
#   * p007 (c2 borderline — gestures-without-mechanism). Names the
#     trilemma and maps each problem to each approach but doesn't
#     explain why each approach fits. c2 expected false; grader may
#     reasonably read as met if it accepts the implicit shape-fit
#     reasoning.
#   * p015 (flag borderline — verbose-punt). Hedges throughout
#     without committing to the trilemma, mechanisms, or regimes.
#     Could read as confidently-all-not-met (Unit 2 p015 realigned
#     this direction) or as too-thin-to-grade-fairly. Expected
#     flagged: true; grader may reasonably read as false.
#   * p017 (c1 borderline — code-comment-mechanism). Pseudocode
#     comments name mechanisms and regimes cleanly but the trilemma
#     itself is implicit. c1 expected false; grader may reasonably
#     read as met (Unit 2 p017 went the other way on c1).
#   * p019 (c1/c2/c3 borderline — vendor-claim-as-evidence).
#     Mentions the trilemma but argues for fine-tuning across all
#     three problems, citing recent provider availability as
#     evidence. Tests whether the grader catches the contradiction
#     between using the vocabulary and applying it contrarily. c1
#     expected true (vocab mentioned); grader may reasonably mark
#     false because the framing is contradicted in practice — same
#     direction as Unit 2 p019.
#
# When the gate re-runs, watch for these calibration signals:
#   - All-met pairs should NOT flag.
#   - All-missed-on-topic pairs should ALSO not flag.
#   - Off-topic-but-gradable should NOT flag (T2-B reading).
#   - Thin/punting answers SHOULD flag.
#   - Confidence on partial-credit pairs is the most informative
#     signal — >90% confidence on a wrong judgement = prompt/rubric
#     phrasing needs tuning.
#   - Disagreement on the four borderlines is *expected signal*, not
#     noise. PR-#72-equivalent triage applies post-gate-run.

unit_id: customization-trilemma-bundle-0

description: |
  Phase 3 / Unit 9 flagship gate set. Authored 2026-05-14 against
  the locked T2-B reading. 21 pairs; distribution biased toward
  partial-credit and single-criterion since those are where grader
  calibration is actually tested. Four deliberate borderline pairs
  (p007, p015, p017, p019) carry the most informative signal.

pairs:
  - id: p001
    label: All three met, balanced answer addressing each problem
    answer: |
      The eng lead is right that there are three approaches on the
      table but wrong that we pick one. These are three different
      problems with three different shapes, and they map cleanly to
      three different approaches.

      The tone problem is a behavior shift. The model can answer;
      it just defaults to a voice we don't want. That's what
      fine-tuning is for — training on examples of the right tone
      changes the model's defaults. RAG won't help (retrieval
      doesn't change interpretation), and prompting nudges per call
      but doesn't shift defaults at production scale.

      The new-product knowledge gap is a knowledge problem. The
      facts exist in retrievable form (the Confluence docs). RAG
      is the right tool — expand the index. Fine-tuning would be
      wrong here: training shifts behavior distribution but doesn't
      reliably load facts, and six months from now with product
      line #3 we'd be stale again.

      The output-drift problem is a spec problem. The model can do
      the task and knows the facts; it just doesn't know what
      "good" looks like specifically. That's a prompt fix — write
      the format spec clearly, add 3-5 boundary examples.

      Sequence: RAG expansion + prompt rewrite this quarter (cheap,
      reversible); fine-tune for tone next quarter after we've
      established that a stronger system prompt can't get tone
      close enough. Where I'd be willing to be wrong: tone might
      be addressable in prompting alone, worth trying first before
      committing to fine-tuning's reversal cost.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

