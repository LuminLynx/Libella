  - id: p017
    label: Edge case — pseudocode answer, all three met (comments name capability/cost/latency and Opus/Sonnet/Haiku explicitly per Unit 4 lesson)
    answer: |
      def model_selection(workload_shape, load_bearing_task, projected_volume_per_day):
          # Three-axis decision: capability / cost / latency
          # Anchored to measurement on the load-bearing task at projected scale,
          # not spec-sheet pick.

          # Capability tier: Opus / Sonnet / Haiku, measured per-task not vendor-benchmark
          # Cost: per-call $ × projected_volume × annual workdays (annualized math)
          # Latency: TTFT, total completion p50 + p95 — async surfaces are forgiving

          if load_bearing_task == 'security_flag' and workload_shape == 'high_stakes_single_shot':
              # Opus-class: capability ceiling matters more than cost
              return 'opus'
          elif workload_shape == 'mixed_difficulty':
              # Hybrid: Sonnet default + Opus escalation on security signals
              # Cuts annualized cost ~25% vs Opus-everywhere
              # Preserves Opus-level capability on load-bearing 20% of PRs
              return 'hybrid_sonnet_opus_on_security'
          elif workload_shape == 'high_volume_low_stake':
              # Haiku-class: first-pass triage, structured-output, latency-critical
              return 'haiku'
          else:
              # Default: Sonnet, the quality-at-acceptable-cost middle
              return 'sonnet'

      # For the code-review bot scenario:
      #   workload_shape = 'mixed_difficulty' (security flags + bug catches + style)
      #   load_bearing_task = 'security_flag' for high-risk diffs, 'bug_catch' for rest
      #   projected_volume_per_day = 500
      #   → hybrid_sonnet_opus_on_security
      #   Annualized: ~$7.5k/year blended (vs $10k Opus, $6.25k Sonnet, $1.875k Haiku)
      #
      # Failure modes:
      #   - capability-only (Opus everywhere): cost-at-volume cliff
      #   - cost-only (Haiku everywhere): security-flag floor collapses
      # Bake-off at production-distribution input before locking.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

