# (model-selection-bundle-0).
#
# Model selection is the fifth authored unit and is the
# synthesis unit of Phase 1 — it pulls together Units 1
# (Tokenization / per-token cost), 2 (Context Window /
# budget arithmetic), 3 (Latency / multi-axis speed), and
# 4 (Evals / layered measurement strategy). Treated as
# **standard** under STRATEGY.md § T2 — minimum 10 pairs;
# this set ships at 21 because the rubric has three
# AND-structured criteria and partial-credit signal needs
# density.
#
# Authoring discipline carries forward Unit 4 lessons:
#
#   1. Two deliberate borderlines (p007 c2, p014 c1).
#      Each tests a distinct AND-structure shape.
#   2. Skip flagged-expected pairs. Three consecutive
#      failed designs across Units 2-4 — the grader's 0.6
#      confidence floor is genuinely hard to trip with
#      content-level ambiguity. Coverage gap accepted.
#   3. c3 pairs explicitly map tiers to regimes by name.
#      Unit 4 c3 was grader-strict on "method-name-to-
#      regime mapping"; Unit 5 c3 mirrors with "tier-name-
#      to-regime mapping" (Opus / Sonnet / Haiku per regime).
#   4. p017 pseudocode comments name "capability / cost /
#      latency" and "Opus / Sonnet / Haiku" explicitly.
#   5. p018 emoji density capped at 4 (Unit 3 lesson).
#   6. Pre-author check on all-met pairs: literally
#      enumerate the three axes (Unit 4 p008/p011 lesson).
#
# Pricing in pair answers reflects 2026-05 Anthropic
# pricing (Opus 4.7 $5/$25 per M, Sonnet 4.6 $3/$15 per M,
# Haiku 4.5 $1/$5 per M). Per-PR cost arithmetic uses
# 8k input + 1.5k output workload for the code-review bot.
#
# Position-to-criterion mapping (from
# content/units/model-selection-bundle-0.md slot 8 rubric):
#
#   1. "Names model selection as a multi-axis trade-off
#      (capability vs cost vs latency) AND treats it as a
#      measurement decision anchored to performance on the
#      load-bearing task at projected scale — not a
#      spec-sheet pick."
#   2. "Identifies a concrete failure mode of single-axis
#      model selection AND explains the mechanism — e.g.,
#      picking by cost alone misses capability-tier
#      breakpoints; picking by capability alone hits
#      cost-at-volume cliffs; picking by vendor benchmark
#      misses regressions on the load-bearing task."
#   3. "Distinguishes which model class is load-bearing in
#      which regime — Opus-class for hard reasoning and
#      high-stakes single-shot decisions; Sonnet-class as
#      the quality-at-acceptable-cost default; Haiku-class
#      for high-volume / latency-critical / first-pass-
#      triage workloads; and recognizes the cross-tier
#      hybrid pattern when no single tier fits the
#      cost/quality envelope."
#
# Authoring distribution (21 pairs, 7/4/3/5/2/0):
#   * 7 pairs all-three-met (varied voices)
#       p001, p002, p005, p016 (pt), p017 (pseudocode),
#       p018 (emoji moderate), p021 (concise)
