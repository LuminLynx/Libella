pairs:
  - id: p001
    label: All three met, balanced hybrid recommendation
    answer: |
      The three-tier prototype is a good start, but treating
      it as A vs B vs C misses the synthesis. Model selection
      is a multi-axis decision — capability, cost, latency —
      and the right answer almost always requires measurement
      at projected scale, not a spec-sheet pick.

      The capability differences are real but not uniform.
      Opus catches 85% of bugs / 92% of security flags;
      Sonnet 70% / 78%; Haiku 45% / 38%. Security flags are
      where the value proposition lives (a missed security
      regression is a load-bearing failure), so the
      Opus-to-Sonnet gap matters more there than on style
      suggestions. Haiku at 38% security catch isn't a tier
      choice — it's a non-starter for that part of the
      surface.

      Cost-at-volume is where the arithmetic gets real.
      $0.08/PR × 500/day × 250 workdays ≈ $10k/year for Opus;
      Sonnet ~$6.25k; Haiku ~$1.875k. That's the right
      number to bring to finance — not the per-call cost.

      Latency: 12s for Opus is slow but for code review
      (asynchronous, comments post when ready) it's
      acceptable. For a chat-shape surface 12s would be a
      blocker; here it isn't.

      Synthesis: ship a hybrid. Sonnet-class as the default
      (quality-at-acceptable-cost on most PRs) with an
      escalate-to-Opus rule on security-relevant diffs
      (auth, crypto, payment paths, IAM). That gives
      Opus-level security catch on the load-bearing 20% of
      PRs and Sonnet-level cost on the rest. Estimated
      blended cost ~$0.06/PR ≈ $7.5k/year.

      What I wouldn't do: ship Opus-class everywhere
      (overkill cost on style suggestions); ship Haiku-class
      everywhere (security floor collapses). What I'd verify
      before locking: re-run the eval on the hybrid routing
      logic to confirm the security-signals rule catches
      the right cases.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, measurement-first framing
    answer: |
      The decision can't be made from the prototype numbers
      alone — those are point estimates on a 100-PR eval set.
      The first move is to scope a proper bake-off: scale
      the eval to 500-1000 PRs (real distribution of PR
      sizes and patch types), measure capability per tier on
      the load-bearing tasks (bug catch, security flag)
      separately, measure cost per tier at the real
      input-token distribution (not the average), and
      measure p95 latency per tier.

      The three axes — capability, cost, latency — are all
      measurable but only at the right scale. Capability
      matters most on security flags (Opus 92% vs Sonnet 78%
      is a 14-point gap on the highest-stakes output). Cost
      matters most at production volume (5× ratio between
      Opus and Haiku is $8k/year difference at 500/day).
      Latency is least binding here because code review is
      asynchronous.

      The hybrid play is what the bake-off will probably
      justify: route by query difficulty. Sonnet-class as
      the default on the bulk of PRs; Opus-class escalation
      when the diff includes high-risk patterns
      (auth changes, crypto, dependency updates, IAM);
      Haiku-class for first-pass triage on small style-only
      diffs.

      What ships depends on the bake-off result. What I
      wouldn't ship before running it: a single-tier choice
      based on prototype-level data.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

