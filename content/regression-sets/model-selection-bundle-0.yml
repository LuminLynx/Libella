  - id: p021
    label: All three met, concise / punchy
    answer: |
      Model selection is a multi-axis call — capability,
      cost, latency — anchored to measurement on the
      load-bearing task at projected scale. Spec-sheet pick
      is wrong.

      For this workload: Opus-class 85%/92% catch at
      $10k/year; Sonnet-class 70%/78% at $6.25k;
      Haiku-class 45%/38% at $1.875k (annualized at
      500/day). The 14-point security-flag gap between Opus
      and Sonnet matters because security flag is the
      load-bearing output; the 5× cost gap between Opus and
      Haiku matters at scale.

      Right answer: hybrid. Sonnet-class default + Opus-class
      escalation on security signals (auth, crypto, payment
      paths) + optional Haiku-class first-pass on style-only
      diffs. Captures the security-flag floor without paying
      Opus's full bill on every PR.

      Why not single-tier: Opus-only is overkill on style
      work; Haiku-only collapses on security; Sonnet-only
      misses the security gap. Bake-off at
      production-distribution before locking the routing
      logic.
