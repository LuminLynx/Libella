unit_id: model-selection-bundle-0

description: |
  Phase 3 / Unit 5 standard gate set. Authored 2026-05-11
  against the locked T2-B reading. 21 pairs against the
  AND-structured rubric. Two deliberate borderlines (p007
  c2, p014 c1). Zero flagged-expected pairs — coverage gap
