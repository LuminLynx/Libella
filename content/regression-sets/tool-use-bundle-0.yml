  - id: p003
    label: Off-topic, gradable, pivots to "should we let a model take actions at all"
    answer: |
      Before we design any of this, I think the real question is
      whether we should let a model take real-world actions on
      customer accounts at all. Issuing refunds autonomously is a
      trust and liability decision, not an engineering one. I
      would want legal and risk to weigh in on whether an LLM
      should ever be in the loop on money movement, and I would
      lean toward keeping a human approving every refund
      regardless of how the tools are built. The architecture is
      secondary to that governance call.
    expected:
