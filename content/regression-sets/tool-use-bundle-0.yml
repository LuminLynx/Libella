  - id: p005
    label: All three met, been-bitten experiential voice
    answer: |
      I shipped this mistake once. We gave a support assistant
      broad, forgiving tools and let the model retry whenever a
      call failed. It demoed beautifully. In production a refund
      endpoint started returning a timeout while still processing
      the refund, the model saw the error text, decided to try
      again, and we double-refunded a few hundred customers
      before anyone noticed.

      That taught me tool use is three coupled decisions.
      Granularity is how narrow each tool is. Strictness is
      whether bad arguments are rejected or coerced.
      Recovery-locus is whether the model retries on a fed-back
      error or a deterministic orchestrator owns the failure.
      They are coupled, because once you let the schema be
      lenient the only thing that can interpret the result is the
      model, so you have chosen model-side recovery whether you
      meant to or not.

      For a refund, narrow tools with a strict schema and
      orchestrator recovery is the only combination I would
      accept now, because the stakes are irreversible and
      auditable. The product error is treating this as one
      decision and inheriting the SDK default, and the recovery
      decision is the one nobody makes until production makes it.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

