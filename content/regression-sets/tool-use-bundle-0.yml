  - id: p012
    label: All-missed on-topic — "schema strictness doesn't matter, frontier models rarely emit bad args"
    answer: |
      Schema strictness is over-thought. Frontier models are very
      good at producing well-formed arguments now, so rejecting
      malformed input is solving a problem we will almost never
      have. We should keep the tool definitions permissive so the
      model is not fighting the contract, accept whatever it
      sends for the order lookup and the refund, and let the
      downstream services validate if they care. Strict schemas
      just add friction and more failure paths for a case that
      barely occurs in practice. Permissive by default is the
      pragmatic call.
