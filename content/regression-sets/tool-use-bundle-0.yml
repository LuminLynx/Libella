  - id: p008
    label: Partial credit (c2+c3) — explains the mechanism and maps a stakes-matched combination, recovery leg left implicit so the three decisions are not all named
    answer: |
      The thing that will bite the team is the interaction
      between how forgiving the tools are and what happens when
      one fails. If we make the refund tool broad and lenient and
      let the model handle errors, a refund endpoint that returns
      an error while still processing the refund gets retried by
      the model, and the customer is paid twice. The deeper point
      is that the leniency choice constrains the failure choice:
      once the schema is loose, only the model can interpret the
      result, so you have implicitly handed recovery to the
      model.

      For a refund, which is irreversible and auditable, the
      right match is a narrow strict tool whose failures are
      owned by a deterministic wrapper, the reliable-workflow
      shape. That fits the stakes; an open-ended assistant would
      not need that rigor. The error is reaching for the
      forgiving default because it is less upfront work.
