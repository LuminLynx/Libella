  - id: p010
    label: Single criterion (c2) — explains the broad-lenient-plus-orchestrator-only failure mechanism without naming the framework or mapping a combination
    answer: |
      The core thing that will go wrong is how the forgiveness of
      the tool inputs interacts with who handles failures. If the
      tools accept loosely-shaped arguments and a deterministic
      wrapper is the only thing catching errors, the wrapper
      cannot anticipate what the model will improvise, so a whole
      class of failures simply falls through and shows up later
      as corrupted data nobody traced. It gets worse because the
      looseness and the failure handling are entangled: once
      arguments are coerced rather than validated, the only thing
      that can make sense of the coerced result is the model
      itself, so a wrapper-only approach is fighting the design.
      That entanglement is the heart of why this is hard.
