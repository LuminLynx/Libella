  - id: p016
    label: All three met, long-narrative voice
    answer: |
      Let me walk through why just defining the functions is the
      wrong instinct for this assistant, because the reasoning is
      the whole point.

      Tool use looks like one decision and is actually three, and
      the three are coupled. The first is how granular the tools
      are, ranging from many tools that each do exactly one thing
      to a few broad tools that each do a lot. The second is how
      strict the input contract is, from rejecting anything
      malformed to quietly coercing whatever the model sends. The
      third is where a failed call is recovered, either handed
      back to the model to reason about and retry or caught by a
      deterministic orchestrator that decides what happens next.

      What makes this one coupled decision rather than three
      independent ones is that the choices constrain each other.
      The moment the schema is lenient, the only thing capable of
      interpreting a coerced result is the model, so leniency has
      silently chosen model-side recovery for you. And a tool
      surface that is broad and open-ended cannot be wrapped by a
      deterministic orchestrator, because the orchestrator would
      have to anticipate every improvisation.

      For the refund capability the combination that fits is
      narrow tools, a strict schema, and orchestrator recovery,
      the reliable-workflow shape, because a refund is
      irreversible, auditable, and exactly the kind of action you
      do not want a model retrying on its own. The order lookup
      could tolerate something looser, but the refund cannot. The
      failure the team would ship by inheriting the default is a
      refund that errors, comes back to the model as text, and
      gets retried into a double payment, and the recovery
      decision is the one that never gets made until an incident
      makes it.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

