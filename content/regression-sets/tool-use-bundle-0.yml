  - id: p015
    label: All-missed on-topic — "always let the model retry on any tool error"
    answer: |
      Error handling is straightforward: whenever a tool call
      fails, hand the error back to the model and let it try
      again. The model has the full context and can adapt its
      next attempt, which is more flexible than hard-coding
      recovery logic for every failure mode. This works uniformly
      for the order lookup, the inventory check, and the refund,
      so we do not need different handling per tool. Universal
      model-side retry is the simplest robust policy and we
      should apply it everywhere.
    expected:
