  - id: p014
    label: All-missed on-topic — "one broad do-everything tool is simplest"
    answer: |
      Simplicity should win here. Instead of a pile of narrow
      tools, give the model a single broad tool that takes an
      action name and a free-form parameters object and routes
      internally. One tool is less to document, less for the
      model to choose between, and less surface to maintain. The
      model is smart enough to fill in the right action and
      arguments for an order lookup or a refund. Fewer tools is
      strictly simpler and simpler is better, so a single
      do-everything tool is the right call.
    expected:
