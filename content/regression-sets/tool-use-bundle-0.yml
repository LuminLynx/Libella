description: |
  Phase 3 / Unit 12 flagship gate set. Authored 2026-05-17.
  21 pairs against the locked T2-B reading. First set authored
  under the UNIT_11_GATE.md carried-forward constraints: zero
  flagged-expected pairs, no parenthetical option-lists in answer
