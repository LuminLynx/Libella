pairs:
  - id: p001
    label: All three met, balanced prose covering the three decisions and the refund stakes
    answer: |
      Eng saying it will just define the functions is the trap.
      Tool use here is not one decision but three coupled ones,
      and the combination is what sets the feel rather than any
      single choice.

      The first decision is tool granularity, whether we expose
      many narrow single-purpose tools or a few broad composites.
      The second is schema strictness, whether the input contract
      rejects malformed arguments or coerces them. The third is
      error-recovery locus, whether a failed call is handed back
      to the model to retry or caught by a deterministic
      orchestrator. These constrain each other: a lenient schema
      only works if the model interprets the coerced result, so
      it implies model-side recovery.

      For the refund capability specifically I would pick narrow
      tools with a strict schema and orchestrator recovery, the
      reliable-workflow combination, because a refund is an
      irreversible auditable mutation where correctness beats
      flexibility. The failure eng would hit by inheriting the
      SDK default is broad lenient tools with model-side
      recovery: a refund that errors gets fed back as text and
      the model cheerfully retries it, double-refunding a
      customer. Before launch I want the recovery decision made
      explicitly, because it has no happy-path demo and otherwise
      production decides it for us.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, terse engineering voice
    answer: |
      Three coupled decisions, not one. Granularity is narrow
      single-purpose tools versus broad composites. Strictness is
      reject-malformed versus coerce. Recovery locus is model
      retries on the fed-back error versus a deterministic
      orchestrator catching it. Coupled: lenient schema forces
      model-side recovery because the model is what reads the
      coerced result, and an open-ended tool surface cannot be
      deterministically wrapped.

      Refund is a high-stakes irreversible mutation, so narrow
      plus strict plus orchestrator recovery, the
      reliable-workflow combination. Auditable, predictable,
      failures caught before they execute twice.

      Define-the-functions defaults to broad and lenient with the
      model retrying on error. On a refund that means the model
      re-issues the refund when the first call returns an error,
      double-paying the customer. Demos clean, operates badly.
      Force the recovery decision before launch.
    expected:
      criteria:
