  - id: p006
    label: c1 + c2 met, c3 missing (no regime distinction)
    answer: |
      Latency isn't a single number — model-size and streaming
      are different axes, and the exec's "snappy" intuition is
      about TTFT, not total time. Picking Haiku to save 4
      seconds total when the user can't even see the first 6
