  - id: p007
    label: All three met — gestures-at-quality crossed the c2 bar (was c2 borderline; realigned per UNIT_3_GATE.md — grader-lenient reading mirrors Unit 2 p007)
    answer: |
      The right framing here is multi-axis. There's the
