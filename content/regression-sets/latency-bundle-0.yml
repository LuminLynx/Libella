      streaming lever (TTFT vs blocking), and the question of
      what the user does with the output — and those are
      different conversations. The exec's "snappy" maps to
      TTFT specifically.

      For a chat-shape feature with incremental consumption
      (TL;DR, decisions read top-down) streaming is the
      load-bearing UX choice. For an atomic-output feature
