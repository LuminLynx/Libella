      user no signal that work is happening, even when the
      response will be fast in absolute terms. Streaming the
      Sonnet output fixes that without sacrificing
      action-item quality. Option B trades the load-bearing
      task (action-item extraction) for a perceived-speed
      gain we can get for free via streaming.

      Ship Sonnet + streaming.
