  - id: p008
    label: c2 + c3 met, c1 missing — failure modes + regime distinction without naming multi-axis trade-off
    answer: |
      Two failure modes in the proposed options. Option A
      blocks for 6 seconds — the user sees nothing until the
      response completes. The mechanism is that blocking
      responses give zero progress signal, so 6 seconds feels
      indefinite. Streaming would change "user waits 6s" into
      "user reads along starting at 200ms" with no change in
      total time. Option B trades action-item quality for
      ~3s of total-time savings. Action items are the
      load-bearing output — what PMs paste into Jira — and
      the cheaper Haiku model has lower capability on the
      structured-recall task that action-item extraction is.

      Regime: the meeting summarizer is mostly streaming-
      friendly. Output is top-down, read incrementally. Action
      items have an atomic edge (consumed as a list) but
      that's still served well by streaming, which lets the
      user wait for the action-item section to finish before
      copying. This isn't an atomic-output regime where
      streaming is irrelevant — it's a chat-shape regime.

      Ship Sonnet + streaming.
    expected:
