  - id: p017
    label: Edge case — pseudocode answer, all three met (was c2 borderline; realigned per UNIT_3_GATE.md — pseudocode comments named mechanism cleanly enough to cross c2; differs from Unit 2 p017 where c1 also fell)
    answer: |
      def latency_choice(surface_shape, load_bearing_task, exec_pressure):
          # Three-axis check: model-size, streaming, total-completion
          if surface_shape == 'incremental_consumption':
              # TL;DR, decisions read top-down → streaming is load-bearing
              # User-perceived speed = TTFT, not total time
              return choose_model_for(load_bearing_task) + streaming_enabled()
          elif surface_shape == 'atomic_output':
              # JSON for code, function-call result, form-fill
              # Streaming buys nothing → optimize total completion only
              return smallest_acceptable_model(load_bearing_task)
          else:
              # Mixed shape (action items copied atomically inside chat-shape feature)
              return optimize_for_load_bearing_task(load_bearing_task) + streaming_enabled()

      # For the meeting summarizer:
      #   surface_shape = 'incremental_consumption' (TL;DR top-down)
      #   load_bearing_task = action_item_extraction
      #   → Sonnet + streaming. Haiku loses the load-bearing task.

      # Note: "snappy" from exec usually means TTFT, not total time.
      # Streaming changes user_perception_time without changing latency.
    expected:
