  - id: p017
    label: Edge case — pseudocode answer, all three met (comments name caching/batching/capacity explicitly per Units 4-7 lesson)
    answer: |
      def production_cost_strategy(stable_prefix_ratio, latency_forgiving_share, steady_state_qps):
          # Three production-cost axes: caching / batching / capacity
          # Stack them; don't pick. Discounts multiply, not substitute.
          # Anchor: annualized cost at projected volume, not pilot daily.

          levers = []

          # caching: load-bearing when stable_prefix_ratio is high (>60%)
          # System prompt + RAG context + few-shot examples are typically stable
          # ~10% input rate on cache hits
          if stable_prefix_ratio > 0.6:
              levers.append('caching_enabled')

          # batching: load-bearing for latency-forgiving share
          # 50% discount on both input + output, async (~24h SLA, often faster)
          # Applies AFTER per-call cost is computed → multiplies with caching
          if latency_forgiving_share > 0.5:
              levers.append('batching_for_async_workload')

          # capacity (committed-use): load-bearing at sustained high QPS
          # Trade fixed monthly floor for guaranteed throughput + discount
          # Size to steady-state, not peak
          if steady_state_qps > threshold_for_commitment():
              levers.append('committed_use_baseline')

          # Production-default: stack ALL THREE sized to workload mix
          return levers

      # For the ticket-classifier scenario:
      #   stable_prefix_ratio = 0.8 (4k of 5k tokens stable)
      #   latency_forgiving_share = 0.7 (non-urgent tickets)
      #   steady_state_qps = high (50k/day → 80k/day projected)
      #   → all three levers stacked.
      #
      # Combined: $0.0225 → ~$0.007/ticket (~3× reduction)
      # $410k/year → ~$220k/year at projected Q-end volume.
      #
      # Order: caching this week (low risk), batching in two
      # (UX impact bounded), committed-use after one quarter of
      # post-A-and-B data.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

