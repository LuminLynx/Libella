      Cost at scale is a three-axis problem — caching,
      batching, capacity — and picking one lever misses
      the others.

      Tier-to-regime mapping: caching is load-bearing
      for workloads with large stable prefixes (system
      prompts, RAG context, few-shot examples); batching
      is load-bearing for latency-forgiving workloads
      (overnight classification, bulk processing,
      reporting); committed-use is load-bearing for
      sustained high-QPS production where the steady-
      state floor justifies the 12-month commitment.
      Production cost discipline almost always stacks
