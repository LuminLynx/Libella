# Regression set for the Cost dynamics at scale unit
# (cost-dynamics-bundle-0).
#
# Eighth authored unit, third in the path's productization
# block (after Units 6 Prompt design and 7 Hallucination).
# Standard under STRATEGY.md § T2 — minimum 10 pairs; ships
# at 21.
#
# Authoring discipline carries forward Units 4-7 lessons:
#
#   1. Two deliberate borderlines (p007 c2, p014 c1).
#      p014 c1 borderline tightened further per Unit 6/7
#      pattern — uses production-cost vocabulary without
#      explicit axis enumeration (caching/batching/capacity
#      names absent). Tests whether vocabulary alone (no
#      axis-name enumeration) crosses c1 — predicted false
#      because prior c1-lenient crossings required explicit
#      axis examples.
#   2. Skip flagged-expected pairs (5 consecutive units).
#   3. Partial pairs avoid all explicit axis enumeration
#      where c1 should be missing (5-unit-strong pattern).
#   4. p017 pseudocode comments name "caching / batching /
#      capacity" explicitly.
#   5. p018 emoji density capped at 4 AND avoids embedded
#      percentage-slash notation (Unit 6/7 p018 reproducible-
#      error shape). Plain prose only.
#   6. Pre-author check: all-met pairs literally name all
#      three axes (Unit 4-7 authoring-error lesson).
#   7. Numbers consistent across pairs that do arithmetic
#      ($0.0225/ticket, $1,125/day, $410k/year, projected
#      $655k/year, 50k→80k tickets/day).
#
# Position-to-criterion mapping:
#
#   1. "Names cost-at-scale as a multi-axis production-
#      optimization problem (caching vs batching vs
#      capacity) distinct from headline per-call cost
#      (Unit 5) AND anchors the decision to annualized
#      cost at projected volume, not at current-pilot
#      volume."
#   2. "Identifies a concrete failure mode of single-axis
#      cost optimization AND explains the mechanism — e.g.,
#      enabling caching alone misses the batch-API
#      discount on non-interactive workloads; batch-only
#      without caching pays full input rate on every
#      batched call; committed-use without volume
#      forecasting commits to a higher floor than current
#      usage warrants."
#   3. "Distinguishes which lever is load-bearing in which
#      regime — caching for workloads with large stable
#      prefixes; batching for latency-forgiving /
#      asynchronous workloads; committed-use for sustained
#      high-QPS production where on-demand exceeds
#      committed floor; AND recognizes that production-
#      scale cost discipline almost always layers all
#      three (caching + batching + committed-use sized to
#      steady-state floor), not picking one."
#
# Authoring distribution (21 pairs, 7/4/3/5/2/0):
#   * 7 pairs all-three-met
#       p001, p002, p005, p016 (pt), p017 (pseudocode),
#       p018 (emoji moderate), p021 (concise)
#   * 4 pairs partial credit (2 of 3, incl. 2 borderlines)
#       p006 (c1+c2), p007 (c1+c3, c2 borderline),
#       p008 (c2+c3), p014 (c2+c3, c1 borderline)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2), p011 (c3)
#   * 5 pairs all-missed but on-topic
#       p004, p012, p015, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013

unit_id: cost-dynamics-bundle-0

description: |
  Phase 3 / Unit 8 standard gate set. Authored 2026-05-13
  against the locked T2-B reading. 21 pairs against the
  AND-structured rubric. Two deliberate borderlines (p007
  c2, p014 c1 tightened — tests whether axis-aware
  vocabulary without explicit axis-name enumeration
  crosses c1). Zero flagged-expected pairs. Numbers
  consistent with scenario ($0.0225/ticket current,
  $1,125/day, $410k/year annualized, projected $655k/year
  at 80k tickets/day). See header for design notes.

pairs:
  - id: p001
    label: All three met, balanced layered-optimization recommendation
    answer: |
      Finance is asking the right question and eng is
      framing the wrong answer. Cost at scale isn't a
      pick-the-best-lever decision — it's a stacking
      decision across three production-optimization axes:
      caching, batching, and capacity (committed-use).
      The three options eng prototyped are all real, and
      we should stack them, not pick.

      Anchor: $410k/year annualized at current 50k
      tickets/day, projected $655k/year at 80k by Q-end.
      That's the number to optimize against, not the
      $1,125/day pilot bill.

      Caching first: 4,000 of 5,000 input tokens are
      stable (system prompt + routing rules + in-context
      examples). 80% stable-prefix ratio is exactly where
      caching is load-bearing. Eng's ~$540/day estimate
      holds because caching is the first lever — no
      upstream discounts have reduced the base. Lowest
      eng risk; no UX impact.

      Batching second: 70% of tickets are non-urgent
      (account questions, low-priority billing, post-
      resolution feedback). Route those through the
      Batch API for 50% off both input AND output tokens.
      Eng's ~$390/day Option-B estimate is in isolation;
      on top of caching the actual stacked increment is
      smaller — caching already cut the per-call cost
      that batching halves, so the on-top-of-A increment
      is ~$205/day, not $390. The discounts multiply: a
      batched cache-hit call pays ~5% of the original
      input rate, not 10%. UX impact is real but
      bounded: non-urgent tickets get classified within
      hours instead of within minutes.

      Committed-use third: eng-estimated ~$110-180/day
      in isolation, but applied to the post-caching-and-
      batching base the actual on-top increment is
      smaller. Worth doing because the steady-state QPS
      is high enough to justify the 12-month floor, but
      size the commitment to the steady-state, not to
      peak.

      Combined: ~$0.0225 → ~$0.007/ticket, roughly 3×
      reduction. The eng-prototyped per-option numbers
      don't simply add when stacked — they apply to
      progressively smaller bases. $410k/year drops
      toward ~$125k at current volume, $655k/year drops
      toward ~$200k at Q-end. Recommendation: ship A
      immediately (caching, low risk), B within two
      weeks (batching for non-urgent), C after we have
      one quarter of steady-state data to size the
      commitment correctly. Don't pick one; stack all
      three.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, caching-led framing
    answer: |
      Caching first. The 80% stable-prefix ratio (4k of 5k
      input tokens are system prompt + routing rules +
      examples) is the textbook case for prompt caching —
      this is where caching is load-bearing. ~$540/day
      savings, no UX impact, low eng risk. Ship it this
      week.

      But caching alone isn't the right end-state for a
      50k-tickets/day workload. Cost at scale is a three-
      axis problem: caching, batching, and capacity
      (committed-use). The three axes multiply rather
      than substitute — a batched call that's also a
      cache-hit pays the product of both discounts, not
      the sum. Stacking matters.

      Batching is load-bearing for the 70% latency-
      forgiving slice — non-urgent tickets that can wait
      hours don't need sync-API rates. 50% additional
      discount on top of caching for that share. Ship
      after caching, when we've measured the cache-hit
      rate in production.

      Committed-use is load-bearing for the steady-state
      QPS. 10% additional discount on baseline volume in
      exchange for a 12-month commitment. Size to the
      steady-state floor, not the peak, or you pay for
      capacity you don't use.

      Annualized: $410k current → projected $655k at
      Q-end. Combined optimization brings that toward
      ~$220k. Order: A first (caching), B within two
      weeks, C after one quarter of data.
