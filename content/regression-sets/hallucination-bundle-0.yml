  - id: p008
    label: c2 + c3 met, c1 missing — failure modes + regime mapping without naming three-axis frame or base-rate reframe
    answer: |
      Two failure modes are pointing the same way. The
      mitigation-only path ("just improve the model")
      collapses at scale because the rate compounds with
      volume — 4% at 5000 queries/day is 200 false
      answers daily, ~50,000 a year, and the rate isn't
      going to zero through model iteration alone. The
      mechanism is that rates are properties of model +
      task + prompt, not just model, and grounding does
      more than tier choice on factual hallucination.
      The containment-blind path is even worse: a
      "small" rate of wrongly-paid expense exceptions
      stacks up to real cost, and the bot answering
      expense-policy questions with the same authority
      as remote-work questions is treating high-stakes
      and low-stakes failures equivalently.

      Regime: for high-stakes queries (expense, comp,
      legal), containment is load-bearing — refusal
      paths, confidence-gated UI, explicit routing to
      HR/Finance, blast-radius limits. For scaling
      exposure (200 to 8000), detection is load-bearing
      — real audit cadence, user-flag paths, LLM-judge
      on sampled traffic. For the rate itself,
      mitigation is the lever — answer-quote validation,
      stricter retrieval on high-stakes categories,
      tier choice.

      Don't ship at 8000 with current setup.
