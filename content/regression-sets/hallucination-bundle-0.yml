      Containment is the weakest layer ⚠️. The expense-
      policy case shows cost-of-one is real money. Need
      refusal paths ("can't confirm from current
      policy"), confidence-gated UI, blast-radius
      limits (bot doesn't authorize spend), routing to
      HR/Finance for high-stakes categories.

      Volume math: 4 percent times 5000 queries/day equals 200 false
      answers/day at full launch. A small rate gets big at scale.

      Pilot at 1000 with containment shipped, measure,
      decide. Don't ship at 8000 yet 🛠️.
