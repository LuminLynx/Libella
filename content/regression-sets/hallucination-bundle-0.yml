    answer: |
      The right call depends on the cost-of-one-
      hallucination. For features where individual
      failures are low-cost (a slightly wrong factual
      answer in a clearly assistive tool), mitigation
      is the load-bearing investment — reduce the rate
      and live with what slips through. For features
      where individual failures are high-cost (legal
      liability, financial loss, safety), containment
      is load-bearing — refusal paths, confidence
      signaling, blast-radius limits, human-in-the-loop
      on the boundary. For features where exposure is
      scaling (more users, more traffic, more domains),
      detection is load-bearing — you need to count the
      rate before it bites. High-stakes features need
      all three layered, not just one.
