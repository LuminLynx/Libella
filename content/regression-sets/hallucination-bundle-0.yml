  - id: p017
    label: Edge case — pseudocode answer, all three met (comments name detection/mitigation/containment explicitly per Units 4-6 lesson)
    answer: |
      def reliability_strategy(cost_of_one_hallucination, scaling_exposure, rate_acceptable):
          # Three-axis design: detection / mitigation / containment
          # Hallucination is a base-rate property, not a bug.
          # Every shipped LLM feature has a non-zero rate.

          axes_needed = []

          # detection: load-bearing when scaling exposure
          # Tools: ground-truth eval, source-quote validation,
          # sampled audit (5-10%), LLM-as-judge, user-flag UI
          if scaling_exposure == 'high':
              axes_needed.append('detection_strict')

          # mitigation: load-bearing when rate itself is the problem
          # Tools: RAG grounding, answer-quote validation (T2-D),
          # instruction tightening, model-tier choice (Unit 5),
          # output schema constraints
          if rate_acceptable == 'rate_too_high':
              axes_needed.append('mitigation_layered')

          # containment: load-bearing when cost-of-one is high
          # Tools: refusal paths ("I don't know"),
          # confidence-gated UI, blast-radius limits,
          # human escalation thresholds
          if cost_of_one_hallucination == 'high':
              axes_needed.append('containment_required')

          # High-stakes features need ALL THREE layered
          if cost_of_one_hallucination == 'high':
              return ['detection_strict', 'mitigation_layered', 'containment_required']

          return axes_needed

      # For the internal-KB-Q&A scenario:
      #   cost_of_one_hallucination = 'high' (expense-policy exception = real money)
      #   scaling_exposure = 'high' (200 → 8000 employees, 40× failure surface)
      #   rate_acceptable = 'unknown' (4% on 50 samples isn't a population rate)
      #   → all three axes layered.
      #
      # Volume-compound failure mode:
      #   4% × 5000 queries/day = 200 false answers/day = ~50,000/year
      #   Sub-linear thinking on rates is the standard PM trap.
      #
      # Recommendation: pilot at 1000 with mitigation + containment
      # changes shipped first, real audit cadence, measure rate at
      # scale, then decide on 8000 rollout.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

