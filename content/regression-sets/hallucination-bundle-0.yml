  - id: p006
    label: c1 + c2 met, c3 missing (no regime mapping)
    answer: |
      The team is treating hallucination as a model-
      quality problem when it's a structural base-rate
      property of LLMs. We can't eliminate it — every
      shipped LLM feature has a non-zero rate. The
      reliability question is multi-axis: detection,
      mitigation, containment.

      The failure mode in "just improve the model" is
      that mitigation-only thinking misses the volume
      compound: a 4% rate at 50 queries/day audit
      sample is 2 errors caught. At 8,000 employees ×
      500 queries/day average = 5,000 queries/day. Same
      4% rate = 200 false answers/day, or ~50,000/year.
      The mechanism is that rates don't shrink as you
      scale; they multiply. A "small" rate is only small
      until you do the production-volume arithmetic.

      The expense-exception case shows the cost-of-one
      can be high — a wrongly-paid expense based on a
      hallucinated policy exception is real money. So
      reducing the rate matters, but so does what
      happens to the residual rate.

      We need more than just better mitigation. The
      detection cadence is wrong, containment doesn't
      exist as a layer. Some answer beyond "improve the
      model" is needed before scaling.
