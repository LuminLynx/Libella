  - id: p019
    label: All-missed on-topic — picks "always refuse if unsure" extreme
    answer: |
      The fix is to make the bot refuse anything it's
      uncertain about. If the model isn't 100%
      confident, return "I don't know, ask HR." That
      eliminates hallucination entirely — the bot only
      answers when it's certain, and otherwise routes
      to humans. Yes the answer rate drops a lot, but
      that's the right trade-off: better to be useful
      50% of the time and never wrong than useful 100%
      of the time and wrong 4%. Pick the conservative
      threshold, ship to 8000, let employees ask HR
      directly when the bot bails.
