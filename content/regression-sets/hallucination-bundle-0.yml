# Regression set for the Hallucination + reliability unit
# (hallucination-bundle-0).
#
# First "failure-mode" unit in the path's productization
# block (after Unit 6's "specification" unit). Standard
# under STRATEGY.md § T2 — minimum 10 pairs; this set
# ships at 21.
#
# Authoring discipline carries forward Units 4-6 lessons:
#
#   1. Two deliberate borderlines (p007 c2, p014 c1).
#      p014 c1 borderline tightened per Unit 6 lesson —
#      tests two-axis-with-framing-missing-third-axis to
#      see if that's stricter than single-axis-with-
#      framing.
#   2. Skip flagged-expected pairs (4 consecutive units
#      of skipped flagged-expected after Units 2-4 design
#      failures).
#   3. Partial pairs avoid concrete arithmetic that
#      implicitly enumerates axes (Unit 5/6 lesson).
#   4. p017 pseudocode comments name "detection /
#      mitigation / containment" explicitly.
#   5. p018 emoji density capped at 4 (Unit 3 lesson);
#      also avoids the structural-complexity shape that
#      reproducibly errored on Unit 6 p018 (no embedded
#      percentages with slashes, no markdown-heavy code-
#      adjacent content).
#   6. Pre-author check: all-met pairs literally name all
#      three axes (detection, mitigation, containment) by
#      name (Unit 4/5/6 authoring-error lesson).
#   7. Numbers consistent across pairs that do arithmetic
#      (4% audit rate, 500/day, 8000-employee target,
#      ~50 errors/day at full launch).
#
# Position-to-criterion mapping (from
# content/units/hallucination-bundle-0.md slot 8 rubric):
#
#   1. "Names hallucination as a structural base-rate
#      problem (not a bug to be eliminated) AND treats
#      reliability as a multi-axis design discipline
#      (detection vs mitigation vs containment) anchored
#      to the feature's actual cost-of-failure — not as
#      a 'improve the model' exercise."
#   2. "Identifies a concrete failure mode of single-
#      axis hallucination management AND explains the
#      mechanism — e.g., mitigation-only collapses at
#      scale because a 'small' rate compounds with
#      volume; detection-only without mitigation is just
#      measuring the bleed; containment-only without
#      detection means failures go uncounted."
#   3. "Distinguishes which approach is load-bearing in
#      which regime — detection load-bearing when
#      scaling exposure; mitigation load-bearing when
#      the rate itself is the problem; containment
#      load-bearing when the cost of an individual
#      hallucination is high; and recognizes that
#      high-stakes features require all three layered."
#
# Authoring distribution (21 pairs, 7/4/3/5/2/0):
#   * 7 pairs all-three-met (varied voices)
#       p001, p002, p005, p016 (pt), p017 (pseudocode),
#       p018 (emoji moderate), p021 (concise)
#   * 4 pairs partial credit (2 of 3, incl. 2 borderlines)
#       p006 (c1+c2), p007 (c1+c3, c2 borderline),
#       p008 (c2+c3), p014 (c2+c3, c1 borderline)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2), p011 (c3)
#   * 5 pairs all-missed but on-topic
#       p004, p012, p015, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013
#   * 0 pairs flagged-expected (skip per Units 2-4)

unit_id: hallucination-bundle-0

description: |
  Phase 3 / Unit 7 standard gate set. Authored 2026-05-12
  against the locked T2-B reading. 21 pairs against the
  AND-structured rubric. Two deliberate borderlines (p007
  c2, p014 c1 tightened per Unit 6 lesson). Zero
  flagged-expected pairs. Numbers consistent with scenario
  (4% audit rate, 500/day current, 8000 employees target,
  ~50 errors/day at full launch). See header for design
  notes.

pairs:
  - id: p001
    label: All three met, balanced detection-mitigation-containment recommendation
    answer: |
      Eng is right that 4% audit rate is industry-normal
      for RAG Q&A. But "industry standard" isn't the
      right bar — the right bar is the cost-of-one-
      hallucination on this specific feature, and the
      expense-policy case shows that bar is real money.
      Hallucination isn't a bug we can fix to zero; it's
      a structural base rate we have to design around
      across three axes — detection, mitigation, and
      containment — and we're under-investing in at
      least two.

      Detection: 2/50 audit cases caught means the audit
      worked, but legal is the only one auditing. At
      8,000 employees and 500-1000 queries/day each,
      that's ~5k-10k queries/day total. Even at 0.5%
      hallucination rate we'd see 25-50 false answers
      per day, of which 50/50 audit gives us no
      population-level signal. We need a real audit
      cadence — 5-10% sampled review, LLM-as-judge on
      top of that, and a feedback path users can flag.

      Mitigation: RAG is in place but we don't know what
      the retrieval recall looks like on the load-
      bearing query shapes. Adding answer-quote
      validation (the T2-D pattern — model must cite
      from the source documents, and we validate the
      quote actually appears) would catch the
      hallucinated-policy case. Sonnet-class is fine
      but we should test whether Opus on high-stakes
      queries (anything touching expense, comp, legal)
      cuts the rate further.

      Containment: this is the load-bearing gap. The bot
      currently answers expense-policy questions with the
      same authority as remote-work questions. For high-
      stakes categories (anything that translates to a
      dollar action or a legal commitment) we need
      refusal paths — "I can't confirm this from current
      policy; please ask HR" — and we need a confidence-
      gated UI that visually de-emphasizes low-confidence
      answers.

      Recommendation: don't ship to 8,000. Pilot to
      ~1,000 with mitigation + containment changes,
      measure rate-at-scale, then decide. The cost of
      one wrongly-paid expense exception is bigger than
      the cost of a delayed rollout.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, containment-led framing
    answer: |
      The expense-policy case is the load-bearing fact
      here. CSAT being stable means employees aren't
      noticing the wrong answers — which is worse than
      them complaining, because confident-wrong is more
      dangerous than visibly-wrong. Hallucination isn't
      eliminable; it's a base rate, and the question is
      how we contain the damage when it slips through.

      Three axes need work. Detection: the legal audit
      caught 4% on a small sample — at 8000-employee
      scale we'll see this 40× more often. Real audit
      cadence (5-10% sampled, LLM-judge on top of that,
      a "report this answer" UI path) is needed before
      we can even talk about acceptable rates.
      Mitigation: RAG is necessary but not sufficient.
      Answer-quote validation (require the model to cite
      from sources, validate the quote actually exists)
      catches the citation-hallucination shape. Specific
      to this feature: domain-categorize incoming queries
      and route high-stakes ones (expense, comp, legal)
      through stricter retrieval and a larger model
      tier.

      Containment is where this feature is most exposed.
      The bot's outputs are taken as policy by employees.
      We need: refusal paths for queries that don't have
      clean grounding ("I can't confirm this from current
      policy"); confidence-gated UI that shows low-
      confidence answers as needing human verification;
      blast-radius limits — the bot doesn't directly
      authorize spend, file expense reports, or take any
      action; explicit "ask HR/Finance for this kind of
      question" routing for high-stakes categories.

      Don't ship at 8,000 yet. Hold at current pilot,
      ship the containment changes, scale to ~1,000 with
      tightened detection cadence, measure, then decide.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p003
    label: Off-topic — pivots to data privacy / RBAC, all miss, gradable
    answer: |
      The bigger concern is access control. We're letting
      8,000 employees query a knowledge base that
      probably contains documents not everyone should
      see — comp bands, performance review templates,
      legal docs marked privileged. Before we scale,
      legal and InfoSec need to confirm the corpus is
      access-controlled per role, audit who accessed
      what, and verify that the RAG retrieval respects
