pairs:
  - id: p001
    label: All three met, balanced prose covering all dimensions
    answer: |
      I'd push back on the framing of "is the RAG good?" as one
      number. RAG quality decomposes into three independent
      dimensions, and our feature can fail on any one of them while
      the other two look fine.

      First, recall — did retrieval find the right chunks? This is
      a pipeline question: embed the query, search the index, pull
      top K. If the right chunk isn't in the K we retrieved, the
      model can't use it. I'd track recall@K and MRR. Failure mode
      here is embedding mismatch, chunking boundary, or K set too
      low.

      Second, groundedness — did the model anchor on the retrieved
      context, or did it drift back to parametric memory? The
      retrieved chunks land in the context window but the model
      still has to use them. I'd track RAGAS faithfulness or
      answer-context alignment. Failure mode is chunk dilution from
      high K or conflict between retrieved facts and the model's
      prior.

      Third, citation faithfulness — does the cited source actually
      say what the answer claims? A citation is a UI affordance,
      not a correctness guarantee. The model can cite chunk #3 and
      write a sentence chunk #3 doesn't support. I'd track this
      with span-level source-quote validation, not chunk overlap.

      I'd push back if eng proposed a single composite score. The
      three dimensions need three signals because they hide each
      other — high recall@K can sit on top of a groundedness
      failure, and high groundedness can sit on top of a
      faithfulness failure.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

