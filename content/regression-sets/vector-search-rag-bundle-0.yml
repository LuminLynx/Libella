  - id: p010
    label: Single criterion (c2) — explains mechanisms without naming the three dimensions
    answer: |
      The core failure mode in RAG features is that the model is
      not anchoring on the retrieved context. You retrieve a set of
      chunks and inject them into the prompt, but the model has its
      own learned priors and can drift back to those. This happens
      especially under high K, because the model's attention spreads
      across many retrieved chunks and the irrelevant ones dilute
      the relevant ones. It also happens when the retrieved chunks
      conflict with what the model "knows" from training — in a
      non-trivial fraction of cases the model goes with training
      rather than the retrieved context. The fix is on the prompt
      side: explicit anchoring instructions and a lower K with
      stronger re-ranking. That's the heart of RAG quality.
    expected:
