  - id: p016
    label: All three met, long-narrative voice
    answer: |
      The way I think about RAG quality is that you have a
      pipeline with three distinct stages and a single quality
      number papers over which stage is breaking. That's the trap
      we should avoid before launch.

      The first stage is retrieval. The question is, did we pull
      the chunks that contain the answer into the candidate set?
      The pipeline embeds the query, searches the index, returns
      top K. If the right chunk isn't in the top K, the downstream
      model is operating blind. We measure this with recall@K and
      with mean reciprocal rank, which captures how high the right
      chunk ranks. The failure modes are embedding mismatch —
      where query and chunk vocabulary differ enough that the
      embedding model can't bridge them — and chunking boundary,
      where the answer happens to span the divide between two
      chunks and neither is individually a strong hit.

      The second stage is generation, and the property we care
      about is groundedness. The retrieved chunks land in the
      context window, but the model still chooses whether to lean
      on them or to fall back on what it learned in training. The
      failure mode here is the model drifting from the retrieved
      context, which happens especially under high K because
      attention spreads across many chunks and the irrelevant ones
      dilute the relevant ones. We measure groundedness with
      RAGAS-style faithfulness scores or answer-context alignment.

      The third stage is citation, and the property is faithfulness
      of the citation itself. The model can produce a citation that
      points at a real chunk and still claim something that chunk
      does not actually entail. This is the dimension I see PMs
      underweight most often, because a citation feels like a
      guarantee and isn't. We measure this with span-level
      source-quote validation — pull the specific cited span, check
      whether it entails the specific claim it is attached to.

      Three stages, three measurements. I would push back hard on
      a single composite quality score, because each dimension can
      fail independently and the dimensions hide each other from a
      reader who is looking at one number.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

