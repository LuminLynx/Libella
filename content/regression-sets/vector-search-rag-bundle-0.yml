    answer: |
      Quality for RAG mostly comes down to chunk size. If we're
      seeing weak answers, the team should increase chunk size so
      that each retrieved chunk contains more surrounding context.
      Larger chunks mean the model has more to work with and is
      less likely to miss key information. I'd set a target of
      doubling our current chunk size and re-running our eval set.
      That single intervention addresses most RAG quality issues
      and is the cheapest thing to try.
