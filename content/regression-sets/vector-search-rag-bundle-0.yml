  - id: p008
    label: Partial credit (c1+c3) — hybrid-retrieval-focused
    answer: |
      RAG quality has three layers: retrieval, generation, and
      audit. On retrieval, we track recall@K and MRR. The standard
      improvement is hybrid retrieval — vector plus BM25 — which
      catches keyword matches the embeddings miss, plus a
      cross-encoder re-ranker on the top 50 candidates. That
      usually moves recall meaningfully.

      On generation, we track RAGAS faithfulness so we know the
      model is anchoring on what we retrieved.

      On audit, we track span-level source-quote validation so we
      catch citations that don't back their claims.

      The composite-score push-back is that each layer can fail
      independently — high recall doesn't imply good generation,
      good generation doesn't imply faithful citations.
