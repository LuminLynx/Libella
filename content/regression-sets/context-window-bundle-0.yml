  - id: p005
    label: All three met, terse engineering-flavored voice
    answer: |
      Three-axis problem: cost, recall, scale. The eng lead is
      right that for one bounded doc the math is fine — cache
      the doc prefix, pay 10% on repeats, ship in two weeks.
      Wrong to extrapolate to 20-50 docs.

      Failure modes: (1) input cost scales linearly per stuffed
      token, so a 30-doc query is ~30× a one-doc query;
      caching only helps the repeated prefix, not the inflated
      active context. (2) Recall degrades mid-context on long
      inputs (Lost in the Middle and replications); the EU AI
      Act contradiction query is exactly the multi-needle
      pattern that breaks. (3) Single-doc and multi-doc are
      different systems, not the same system at higher N.

      Phase 1: stuff-it-in, with a recall test on real queries
      before launch. Phase 2: retrieval, designed in from the
      start. Two-week win on phase 1 is fine if it doesn't
      make us pretend phase 2 is the same architecture.
    expected:
