  realigned 2026-05-10 after the initial gate run per
  docs/UNIT_2_GATE.md. 22 pairs against the locked T2-B reading
  (flagged = grader uncertainty, NOT off-topic-but-gradable).
  Two preserved disagreements (p008 c1, p010 c2) surface where
  the rubric language has slack and the grader's reading
  diverges from the literal text in a defensible direction.
  One flagged-expected pair (p022) targets genuine grader
