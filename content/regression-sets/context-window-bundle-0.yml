  - id: p007
    label: All three met — names cost mechanism cleanly while gesturing at recall (was c2 borderline; realigned per UNIT_2_GATE.md)
    answer: |
      Context-window choice is a three-way trade-off: bigger
      windows let you fit more, but they cost more linearly with
      what you put in, and the model may not use the long
      context well even when content technically fits. The eng
      lead is collapsing this to "it fits, ship it."

      For phase 1 — one 80-250 page document, well-bounded
      queries about its own content, cost dominated by other
      things — stuffing the whole doc into context is a
      reasonable default. With prompt caching it's also
      cost-efficient on repeats. I'd ship it.

      For phase 2 — 20-50 docs per user, needle-in-haystack
      queries that span the corpus and require contradiction-
      detection against external references — the regime is
      different and retrieval becomes the load-bearing
      architecture, not an optimization. Different system, not
      same system at scale.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p008
