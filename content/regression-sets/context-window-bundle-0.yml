  - id: p006
    label: c1 + c2 met, c3 missing (no regime distinction)
    answer: |
      Context window is a budget, not a capacity. Three things
      are happening at once: input cost scales linearly with
      what you stuff in (so doubling the doc roughly doubles
      per-call cost), effective recall can fall on long inputs
      especially mid-context, and the architecture decision you
      make today shapes what's possible next quarter.

      The eng lead's pitch ignores the linear cost scaling —
      even with prompt caching the active query tokens are
      billed per call, and a 30-doc query at 50k tokens each is
      1.5M tokens of input cost compounded over user volume.
      The recall problem is real too: needle-in-haystack queries
      like the EU AI Act check are exactly where long-context
      recall is weakest. So the answer isn't just "how fast can
      we ship" — it's "what evidence do we have that recall
      holds on representative queries."
