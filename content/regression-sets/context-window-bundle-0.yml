pairs:
  - id: p001
    label: All three met, balanced two-phase answer
    answer: |
      The eng lead is right that "it fits" is true and that
      retrieval is real engineering work. He's wrong about
      treating the headline number as a budget. Context window
      is a budget — input + output both billed against it,
      scaling linearly with what you stuff in, and effective
      recall on long inputs (especially mid-document) is not
      the same fact as "the document fits."

      For phase 1 (single 80-250 page doc) I'd actually ship
      his stuff-it-all-in version — but with a recall verification
      step before launch: a representative test set of real
      policy questions where I check whether the model surfaces
      the right clause, not just claims to have read everything.
      With prompt caching on the document prefix, per-call cost
      on a fixed doc is acceptable.

      For phase 2 (20-50 doc library, needle-in-haystack queries
      like the EU AI Act contradiction check) the regime
      changes: cost scales 20-50x linearly, recall on multi-needle
      / cross-document queries is exactly the failure mode
      benchmarks show is hardest, and the architecture you ship
      for one doc doesn't survive fifty. That phase needs
      retrieval, designed in. The two-week-vs-two-month win on
      phase 1 is real, but doesn't transfer.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, cost-led framing
    answer: |
      What the eng lead is missing is that the 1M-token context
      isn't a fixed-cost budget — it's a per-call multiplier.
      Each query that stuffs a 150k-token document pays for
      150k input tokens. That works on phase 1 because the doc
      is fixed, prompt caching can knock ~90% off the
      repeat-prefix cost, and the cost-per-question stays small.

      It breaks on phase 2. With 20-50 docs/user, even with
      caching, the active prefix is much larger per query;
      recall starts to bite (long-context evals show mid-input
      recall degrades, especially on multi-needle queries like
      "find a contradiction with the EU AI Act"); and a one-doc
      architecture has no way to pick which of 50 documents to
      consult.

      The decision: ship phase 1 as proposed, but with a recall
      test on representative queries before launch. Plan phase
      2 as retrieval-from-the-start; treat the two-week phase-1
      win as a deliverable that won't transfer architecturally.
      The eng lead is right about phase 1 timeline, wrong about
      extrapolating it.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

