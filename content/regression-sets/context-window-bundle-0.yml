# Regression set for the Context Window unit (context-window-bundle-0).
#
# Context Window is the second authored unit and is treated as
# **flagship** under STRATEGY.md § T2 — target is >= 20 pairs before
# the unit publishes. Authoring discipline mirrors
# tokenization-bundle-0.yml (the Phase 2 gate-passing reference).
#
# Position-to-criterion mapping (from
# content/units/context-window-bundle-0.md slot 8 rubric, in
# authored order):
#
#   1. "Names the three-way trade-off the unit is built around —
#      fits-more vs. costs-more vs. recall-can-degrade-over-long-
#      context — and treats the context window as a budget, not a
#      capacity number to be filled."
#   2. "Identifies a concrete failure mode of 'just use the long
#      window' beyond hitting the hard limit, AND identifies the
#      mechanism behind it — e.g., per-call cost scales linearly
#      because input tokens are priced linearly; effective recall
#      can degrade mid-context, as documented in long-context
#      recall evals; single-document architectures break under
#      multi-document or growing-state load because retrieval and
#      summarization weren't designed in."
#   3. "Distinguishes a regime where 'use the long window' is a
#      reasonable default (single bounded document, query shape
#      verified on representative input, cost acceptable for
#      projected volume) from a regime that forces retrieval or
#      summarization (growing corpora, growing agent state, query
#      shapes that benefit from focused context)."
#
# Authoring distribution (22 pairs, 7/3/3/6/2/1; post-Unit-2-gate
# realignment per docs/UNIT_2_GATE.md):
#   * 7 pairs all-three-met (varied voices, incl. edge-case voices)
#       p001, p002, p005, p007, p016 (pt), p018 (emoji), p021 (concise)
#   * 3 pairs partial credit (2 of 3)
#       p006 (c1+c2), p008 (c2+c3 — preserved disagreement on c1),
#       p017 (c2+c3, code)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2 — preserved disagreement on c2 reading),
#       p011 (c3)
#   * 6 pairs all-missed but on-topic
#       p004, p012, p014, p015, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013
#   * 1 pair flagged-expected (genuine grader uncertainty target)
#       p022
#
# T2-B locked interpretation (per docs/PHASE_2_GATE.md and PR #72):
# flagged = grader *uncertainty*, NOT "answer is bad." An off-topic
# answer the grader can confidently grade as all Not-Met is
# gradable — flagged: false. A thin or punting answer the grader
# cannot fairly grade — flagged: true.
#
# UNIT_2_GATE realignment (2026-05-10): the initial run revealed
# that two flag-expected pairs (p014, p015) and three borderlines
# (p007, p017, p019) had YAML expectations that drifted from the
# grader's spec-faithful reading. Realigned per the standard
# triage (docs/UNIT_2_GATE.md). Two preserved disagreements remain
# as calibration signal, surfacing where rubric language has slack:
#
#   * p008 (c1 preserved disagreement — grader reads implicit budget
#     framing as crossing the bar). The rubric says "names the
#     three-way trade-off AND treats as budget." p008 demonstrates
#     the budget treatment but doesn't name the three-way trade-off
#     explicitly. YAML c1=false (strict reading); grader marked c1=true
#     (lenient reading). Held to keep the c1 phrasing slack visible
#     for future rubric tightening.
#
#   * p010 (c2 preserved disagreement — grader reads single mechanism
#     as not crossing the bar). The rubric says "identifies *a*
#     concrete failure mode AND its mechanism" — singular. p010 names
#     the cost mechanism cleanly with no second mechanism. YAML
#     c2=true (literal singular reading); grader marked c2=false
#     (depth-grounded reading wants multiple). Held to keep the c2
#     phrasing slack visible — same direction as tokenization p020
#     (grader more rigorous than rubric language requires).
#
# When the gate re-runs after realignment, watch for these
# calibration signals:
#   - All-met pairs should NOT flag.
#   - All-missed-on-topic pairs should ALSO not flag.
#   - Off-topic-but-gradable should NOT flag (T2-B reading).
#   - p022 (flagged-expected) should flag — designed to trigger
#     genuine grader uncertainty via hedge language on c1 framing
#     and c3 regime distinction. If it doesn't flag, that's data
#     for v2 — the grader's confidence floor is harder to trip
#     than we thought.
#   - Confidence on partial-credit pairs is the most informative
#     signal — if the grader reports >90% confidence on a wrong
#     judgement, the prompt or rubric phrasing needs tuning.
#   - p008 + p010 are *expected disagreement*. The runner will
#     report them as FAILs; that's the calibration signal we are
#     keeping, not noise.

unit_id: context-window-bundle-0

