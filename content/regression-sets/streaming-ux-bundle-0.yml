pairs:
  - id: p001
    label: All three met, balanced prose covering the three decisions and the surface fit
    answer: |
      Eng saying "stream it like chat" is the trap. Streaming this
      brief isn't one decision — it's three coupled ones, and the
      combination produces the feel, not any single choice.

      What to stream: raw tokens, semantic chunks, or status only.
      How to render the streamed state: continuous flow,
      progressive sections, or typed-out. How to recover from a
      mid-stream failure: silent retry, partial accept, or full
      restart.

      For a structured brief with headings, bullets, and a summary
      table, the matched combination is semantic-chunk streaming
      plus progressive-section rendering plus partial-accept
      recovery — the artifact/canvas feel. The brief assembles
      section by section, and if the stream dies at the table the
      user keeps the headings and bullets that already arrived.

      The chat triple eng wants is token streaming plus
      continuous-flow rendering plus full-restart recovery. On
      this surface it fails two ways. First, the user watches a
      half-parsed markdown table assemble character by character
      and reads the feature as broken even though it's working.
      Second, the decisions constrain each other: continuous-flow
      rendering rules out partial-accept recovery, because a
      half-streamed token is incoherent to keep, so a dropped
      stream means a full restart and ten more seconds. Demos
      fine on a fast network, operates badly on a real one.

      Before launch I want the recovery decision made explicitly
      — it has no happy-path demo, so it gets skipped, and the
      first dropped stream in production decides it for us.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

