  - id: p016
    label: All three met, long-narrative voice
    answer: |
      Let me walk through why "stream it like the chat feature"
      is the wrong instinct for this brief, because the reasoning
      is the whole point.

      Streaming looks like one decision and is actually three, and
      the three are coupled. The first is what we put on the wire
      — raw token deltas, semantically meaningful chunks like a
      completed section, or just status events that say what the
      system is doing. The second is how the client renders the
      streamed state — appending every delta in a continuous flow,
      holding each unit until it's complete and revealing it as a
      whole section, or pacing a deliberate typed-out reveal. The
      third is what the UI does when the stream dies partway,
      which it will — silently retrying, accepting and marking the
      partial result, or discarding and regenerating from scratch.

      What makes this a single coupled decision rather than three
      independent ones is that the choices constrain each other.
      If we render in a continuous flow, partial-accept recovery
      stops being coherent, because the thing we'd be accepting is
      a half-formed token stream, not a usable artifact — so the
      render choice has silently made the recovery choice for us.

      For a structured brief — headings, bullets, a summary table,
