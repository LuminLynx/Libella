  - id: p010
    label: Single criterion (c2) — explains the mismatch mechanism without naming the three-decision framework or mapping a good combination
    answer: |
      The thing that will bite us is what happens when you push a
      structured document through a renderer that appends every
      token as it arrives. A markdown table or a JSON block is
      only coherent once it's complete; mid-stream it's a mess of
      half-formed syntax, and the user sees that mess and concludes
      the AI is broken even though generation is working perfectly.
      It gets worse on a dropped connection — because the renderer
      has been showing raw incremental output, there's no clean
      partial result to keep, so the only safe move is to throw it
      all away and regenerate from scratch, which on a ten-second
      generation is a very visible penalty. The render approach
      and the failure approach are entangled; you can't choose one
      without constraining the other.
