  - id: p012
    label: All-missed on-topic — "token-stream everything, lowest TTFT always wins"
    answer: |
      The metric that matters for streaming is time to first
      token. Users judge responsiveness by how fast something
      starts appearing, so the right call is always to token-
      stream at the lowest possible granularity and render every
      token the instant it arrives. Buffering into semantic chunks
      just adds latency before the user sees anything, which is
      exactly what we're trying to avoid. Token streaming with
      immediate rendering minimizes time to first token on every
      surface, including this brief. Lowest TTFT wins; that's the
      whole game.
