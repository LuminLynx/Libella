    answer: |
      The real question here is transport. Server-Sent Events is
      the default, but it's unidirectional and has connection
      limits over HTTP/1.1, whereas WebSockets give us
      bidirectional communication and better control over
      reconnection. For a feature we want to scale, I'd push eng
      to evaluate WebSockets or even gRPC streaming instead of
      defaulting to SSE. The transport choice determines our
      reconnection story and our infrastructure cost more than
      anything on the UI side. Let's get the protocol decision
      right first.
