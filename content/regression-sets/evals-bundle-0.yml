  - id: p017
    label: Edge case — pseudocode answer, all three met (comments name all four methods explicitly per Unit 3 lesson)
    answer: |
      def eval_strategy(decision_window_hours, has_traffic, failure_known):
          # Four methods, layered: human_eval / llm_as_judge / golden_set / live_ab
          # No single method answers a production-bearing question.
          methods = []

          if decision_window_hours <= 48:
              # Fast read-out needed → live_signal + llm_as_judge
              # live_signal: escalation_rate is early indicator; CSAT lags by ~5 days
              methods.append('live_signal')
              # llm_as_judge: scales to all escalated conversations
              # Caveat: Sonnet-judging-Sonnet has self-enhancement bias
              methods.append('llm_as_judge')

          if failure_known:
              # golden_set: deterministic CI gate, catches known regressions
              # Blind to unknown regressions by construction
              methods.append('golden_set')
          else:
              # human_eval: load-bearing on ambiguous quality
              # Small N (~20-30), slow, but resolves llm_as_judge uncertainty
              methods.append('human_eval')

          if has_traffic:
              # live_ab: definitive comparative signal on production
              # Requires exposing users to the failure being tested
              methods.append('live_ab')

          return methods

      # For the migration scenario:
      #   decision_window_hours = 48, has_traffic = True, failure_known = False
      #   → live_signal + llm_as_judge + human_eval + live_ab
      #   Recommendation: roll back, investigate with offline methods,
      #   re-ship with golden_set expansion once failure category identified.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

