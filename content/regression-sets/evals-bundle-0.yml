# Regression set for the Evals unit (evals-bundle-0).
#
# Evals is the fourth authored unit and is treated as
# **standard** (not flagship) under STRATEGY.md § T2 — minimum
# 10 pairs; this set ships at 21 because the rubric has three
# AND-structured criteria and partial-credit signal needs
# density to distinguish AND-half-failures from single-
# criterion misses.
#
# Authoring discipline carries forward three Unit 3 lessons:
#
#   1. Two deliberate borderlines (down from Unit 3's three).
#      Each tests a distinct AND-structure shape on c1 or c2.
#   2. Skip flagged-expected pairs. Two consecutive failed
#      designs across Unit 2 (hedge) and Unit 3 (multi-
#      borderline) — the grader's 0.6 confidence floor is
#      genuinely hard to trip. Coverage gap accepted for v1.
#   3. Pseudocode comments must name rubric vocabulary
#      directly. Unit 3 p017 c1 stayed true because comments
#      named "model-size, streaming, total-completion"
#      explicitly. Unit 4 p017 names "human eval / LLM-as-
#      judge / golden-set / live A/B" similarly.
#   4. Moderate emoji density on the emoji-voice pair. Unit 3
#      p018 (8 emojis) reproducibly errored. Unit 4 p018 caps
#      at 4 emojis to stay safely below the T2-D structural-
#      validation failure threshold.
#
# Position-to-criterion mapping (from
# content/units/evals-bundle-0.md slot 8 rubric, in authored
# order):
#
#   1. "Names evals as a multi-method choice (human eval /
#      LLM-as-judge / golden-set / live A/B or live signal)
#      AND treats the answer as a layered strategy, not a
#      single-method pick — including the recognition that no
#      single method answers the question alone."
#   2. "Identifies a concrete failure mode of choosing one
#      eval method exclusively AND explains the mechanism —
#      e.g., golden-set passes don't catch unknown regressions;
#      LLM-as-judge shares blind spots with the model being
#      evaluated; CSAT lags real failures by days because
#      users don't survey when they bounce; human eval is
#      small-N and slow."
#   3. "Distinguishes which method is load-bearing in which
#      regime — golden-set for CI gates and migration sanity
#      checks; LLM-as-judge for scaled breadth-checking;
#      human eval for ambiguous-quality and edge cases pre-
#      launch; live A/B or live signal (escalation rate,
#      retry rate, conversation length) for shipped-feature
#      decisions and lagging metrics."
#
# Authoring distribution (21 pairs, 8/3/3/5/2/0; corrected
# pre-gate per reviewer flag on p008 — see header note):
#   * 8 pairs all-three-met (varied voices)
#       p001, p002, p005, p008, p016 (pt),
#       p017 (pseudocode), p018 (emoji moderate),
#       p021 (concise)
#   * 3 pairs partial credit (2 of 3, incl. 2 borderlines)
#       p006 (c1+c2), p007 (c1+c3, c2 borderline),
#       p014 (c2+c3, c1 borderline)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2), p011 (c3)
#   * 5 pairs all-missed but on-topic
#       p004, p012, p015, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013
#   * 0 pairs flagged-expected (design failed twice; skip)
#
# Pre-gate correction (2026-05-10): p008 was originally
# classified c2+c3 met / c1 missing, with intent "failure
# modes + regime without naming multi-method choice as
# layered." Reviewer correctly flagged that the answer
# enumerates all four methods (live signal, LLM-as-judge,
# human eval, golden-set) AND structures them as layered by
# decision regime ("For the 48-hour... For longer-term...
# For preventing this next time..."). That satisfies c1.
# Corrected to all-three-met before any gate run; YAML
# inconsistency would have scored a correctly-lenient grader
# as wrong and distorted agreement metrics.
#
# Two deliberate borderlines:
#
#   * p007 (c2 borderline — gestures at LLM-judge bias without
#     naming the self-enhancement mechanism). Tests c2's AND
#     structure: is "LLM-judge has biases" alone the
#     mechanism, or does the answer need to name self-
#     enhancement / position / verbosity bias specifically?
#     c2 expected false; grader may reasonably read as met
#     (mirrors Unit 2/3 c2 grader-lenient pattern).
#
#   * p014 (c1 borderline — gestures at "multiple methods"
#     without enumerating the four). Uses "use multiple eval
#     approaches" language but never names human eval, LLM-
#     as-judge, golden-set, or live A/B by name. Tests c1's
#     AND structure: is "multiple methods" gesture enough, or
#     does naming require enumeration? c1 expected false;
#     grader may reasonably read as met if vocabulary alone
#     crosses.

unit_id: evals-bundle-0

description: |
  Phase 3 / Unit 4 standard gate set. Authored 2026-05-10
  against the locked T2-B reading. 21 pairs against the
  AND-structured rubric. Two deliberate borderlines (p007,
  p014) tuned to mirror Unit 2/3 c2-lenient and c1-strict
