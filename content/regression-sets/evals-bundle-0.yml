pairs:
  - id: p001
    label: All three met, balanced layered-strategy answer
    answer: |
      The CEO wants a 48-hour answer, and a single eval
      method can't give one honestly. We need a layered
      approach because each method catches a different
      failure shape.

      Order I'd run them in:

      1. Golden-set first (already running, 98% pass). That
         tells us nothing about the escalation spike because
         golden-sets only catch *known* regressions — the
         migration broke something we didn't write a pair
         for. Pass-rate doesn't mean safe; it means safe
         against what we already test.

      2. Pull 50-100 escalated conversations from the last
         48 hours, run LLM-as-judge on them. Fast, scales.
         The catch: we're using Sonnet 4.6 as judge on
         Sonnet 4.6 outputs, so self-enhancement bias is
         real — set the judge to score against specific
         rubric criteria (tone, accuracy, resolution) rather
         than holistic quality, and weight the result
         accordingly.

      3. Sample 20-30 of those for human eval — focus on
         cases where LLM-judge confidence was low or where
         the escalation reason was ambiguous. This is the
         expensive method but it's how we resolve LLM-judge
         disagreements on the load-bearing cases.

      4. Live signal: escalation rate is the early indicator
         CSAT will eventually catch. We don't need to wait
         for CSAT — escalation up 12% w/w with golden-set
         passing is a strong signal that something
         user-visible changed that our offline evals missed.

      My recommendation: roll back temporarily while running
      steps 2-3. The cost of a 48-hour rollback is small;
      the cost of a 5-day CSAT-confirmed quality regression
      is much larger.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

