  - id: p011
    label: c3 only — regime mapping, no axis frame, no mechanism
    answer: |
      The right pick depends on what's being specified.
      For stable behavior contracts — output schema, role
      definition, hard rules — system prompt with
      instructions is the load-bearing approach. For
      per-call variability — the transcript itself, any
      runtime parameters — user prompt is where it
      belongs. For cleanly-specifiable rules, zero-shot
      instructions are the right default. For ambiguous-
      criteria or edge-heavy tasks, few-shot examples are
      load-bearing because instructions can't fully cover
      the boundary. The PM-default when no single approach
      fits the full contract is a hybrid — instructions
      for the rule-shaped part, examples for the judgment-
      shaped part. Different approaches for different
      contract shapes.
