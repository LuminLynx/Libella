  - id: p017
    label: Edge case — pseudocode answer, all three met (comments name system/user prompt and instructions/examples explicitly per Units 4-5 lesson)
    answer: |
      def prompt_strategy(contract_part, ambiguity_level, maintenance_cadence):
          # Two-axis decision: where contract lives + how it's expressed
          # Axis 1: system_prompt (stable, cached, per-deploy) vs user_prompt (variable, per-call)
          # Axis 2: instructions (declarative, low-token) vs examples (few-shot, token-heavy)

          # Per-call variability always goes in user prompt
          if contract_part == 'per_call_content':
              # The transcript, the user query, the runtime parameters
              return 'user_prompt'

          # Stable contracts go in system prompt; the how-expressed is the choice
          # Axis 2 maps to ambiguity_level:
          if ambiguity_level == 'clean_rule_specifiable':
              # Output schema, required fields, role definition, refusal conditions
              # Instructions are the right default — low token, easy to update
              return 'system_prompt_instructions'

          if ambiguity_level == 'judgment_shaped':
              # Pattern-matching tasks (what counts as explicit assignee, what tone is too aggressive)
              # Few-shot examples capture nuance instructions can't fully specify
              # Caveat: maintenance cost when data distribution shifts
              if maintenance_cadence == 'weekly':
                  # High-drift surface — keep example count small (3-5 boundary cases)
                  return 'system_prompt_hybrid'  # instructions + few examples
              else:
                  return 'system_prompt_few_shot'

          # Default for mixed specifications: hybrid is the PM-default
          return 'system_prompt_hybrid'

      # For the meeting-action-item-extractor scenario:
      #   contract_part: transcript_content (user prompt) + rules_and_schema (system prompt)
      #   ambiguity_level: clean_rule_specifiable (output JSON) + judgment_shaped (explicit assignee)
      #   maintenance_cadence: monthly (team naming, project vocab shift)
      #   → ship C (hybrid): instructions for schema/role + 4 boundary examples for assignee judgment
      #
      # Failure modes:
      #   - pure instructions: ambiguous-criteria tasks need example-shaped specification (A's 8% hallucination)
      #   - pure few-shot: data drift stales the example set (B's maintenance overhead)
      # Verify hybrid coverage with Unit 4 layered eval before prompt-lock deadline.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

