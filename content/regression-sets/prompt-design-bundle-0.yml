  - id: p016
    label: Edge case — Portuguese, all three met
    answer: |
      A equipa está a tratar isto como um exercício de
      escolha-o-melhor-prompt quando é uma decisão de
      contrato. Prompt design tem dois eixos de decisão:
      onde o contrato vive (system vs user prompt) e como
      é expresso (instructions vs examples). Os três
      protótipos diferem só no segundo eixo.

      O system prompt é onde o contrato de comportamento
      vive — output schema (JSON), role, regras — porque é
      estável entre calls e beneficia do prompt caching. O
      user prompt é onde a transcrição vai — variabilidade
      por call. Os três protótipos têm isso certo.

      No eixo instructions-vs-examples: a opção A (pure
      instructions) falha em tarefas de critério ambíguo
      — "o que conta como assignee explícito" é território
      de julgamento, e a taxa de 8% de hallucination é
      precisamente essa lacuna de cobertura das regras. O
      mecanismo: regras declarativas degradam em tarefas
      de pattern-matching. A opção B (pure few-shot) cobre
      melhor (88% catch) mas com 12 exemplos a manutenção
      torna-se um problema quando o estilo das reuniões
      muda (novos termos de equipa, novo vocabulário).

      Tier-to-regime: instructions para partes do
      contrato com regras limpas (output format,
      required fields); few-shot para partes ambíguas
      (3-5 exemplos do que conta como ação com assignee
      explícito); hybrid quando ambos os regimes estão
      presentes no mesmo contrato.

