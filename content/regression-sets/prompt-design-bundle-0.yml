# Regression set for the Prompt design basics unit
# (prompt-design-bundle-0).
#
# Prompt design basics is the sixth authored unit, first
# unit in the "productization" block (post-synthesis). Per
# v1-path-outline.md, prompt design lives after model
# selection because prompts are model-specific (XML for
# Claude, JSON for GPT-4.1, etc.); teaching prompt design
# before a tier choice is teaching it in the wrong order.
# Standard under STRATEGY.md § T2 — minimum 10 pairs;
# this set ships at 21.
#
# Authoring discipline carries forward Units 4-5 lessons:
#
#   1. Two deliberate borderlines (p007 c2, p014 c1).
#   2. Skip flagged-expected pairs (3 consecutive failed
#      designs across Units 2-4; coverage gap accepted).
#   3. Partial pairs avoid concrete per-axis arithmetic
#      (Unit 5 lesson — per-axis numbers cross c1 grader-
#      lenient even without explicit axis enumeration).
#   4. p017 pseudocode comments name "system prompt / user
#      prompt / instructions / examples / hybrid"
#      explicitly (Unit 4/5 pseudocode-vocab lesson).
#   5. p018 emoji density capped at 4 (Unit 3 lesson).
#   6. Pre-author check: all-met pairs literally name both
#      axes by name (Unit 4 p008/p011 + Unit 5 p008/p014
#      authoring-error lesson).
#   7. Numbers consistent across pairs that do arithmetic
#      (78%/88%/85% catch + 8%/3%/4% hallucination from
#      scenario).
#
# Position-to-criterion mapping (from
# content/units/prompt-design-bundle-0.md slot 8 rubric):
#
#   1. "Names prompt design as a multi-axis trade-off
#      (system-vs-user prompt, instructions-vs-examples)
#      AND treats it as a behavior-shaping contract
#      decision anchored to the feature's specification
#      needs — not as a writing-quality exercise."
#   2. "Identifies a concrete failure mode of single-axis
#      prompt design AND explains the mechanism — e.g.,
#      instruction-only misses edge cases that examples
#      catch; few-shot-only stales when data distribution
#      shifts; putting per-query content in the system
#      prompt couples content updates to deploys."
#   3. "Distinguishes which approach is load-bearing in
#      which regime — system prompt for stable behavior
#      contracts; user prompt for per-call variability;
#      zero-shot instructions for cleanly-specifiable
#      rules; few-shot examples for ambiguous-criteria or
#      edge-heavy tasks; and recognizes that the PM-default
#      is usually a hybrid (instructions for rule-shaped
#      part + 3-5 boundary examples) rather than picking
#      one extreme."
#
# Authoring distribution (21 pairs, 7/4/3/5/2/0):
#   * 7 pairs all-three-met (varied voices)
#       p001, p002, p005, p016 (pt), p017 (pseudocode),
#       p018 (emoji moderate), p021 (concise)
#   * 4 pairs partial credit (2 of 3, incl. 2 borderlines)
#       p006 (c1+c2), p007 (c1+c3, c2 borderline),
#       p008 (c2+c3), p014 (c2+c3, c1 borderline)
#   * 3 pairs single-criterion-met
#       p009 (c1), p010 (c2), p011 (c3)
#   * 5 pairs all-missed but on-topic
#       p004, p012, p015, p019, p020
#   * 2 pairs off-topic, all-missed, gradable (NOT flagged)
#       p003, p013
#   * 0 pairs flagged-expected (skip per Units 2-4)

unit_id: prompt-design-bundle-0

description: |
  Phase 3 / Unit 6 standard gate set. Authored 2026-05-11
  against the locked T2-B reading. 21 pairs against the
  AND-structured rubric. Two deliberate borderlines (p007
  c2, p014 c1). Zero flagged-expected pairs. Numbers
  consistent with scenario (78%/88%/85% catch, 8%/3%/4%
  hallucination). See header for design notes.

pairs:
  - id: p001
    label: All three met, balanced hybrid recommendation
    answer: |
      The team is treating this as a "pick the best
      prompt" exercise when it's actually a contract-shape
      decision. Prompt design has two PM-decision axes here:
      where the contract lives (system vs user prompt) and
      how it's expressed (instructions vs examples). The
      three prototypes are picking different points on the
      second axis; none of them changes the first.

      System prompt is where the behavior contract belongs:
      output schema (the JSON shape), role ("extract action
      items"), rules. That's stable across calls and
      benefits from prompt caching. User prompt is where
      the transcript goes — per-call variability. All three
      prototypes have that right.

      The instructions-vs-examples trade is the real
      choice. Instructions (A) miss edge cases because the
      failure mode is ambiguous-criteria tasks: "what
      counts as an explicit assignee?" has gray-area cases
      the rules can't fully specify, so the 8% owner-
      hallucination rate is the rules' coverage gap.
      Few-shot (B) catches more (88%) because examples
      anchor the boundary, but 12 annotated transcripts is
      a maintenance burden — when meeting style shifts
      (new team naming, new project vocab), the examples
      need re-curation.

      The hybrid (C) is the PM-default here: 85% catch and
      4% hallucination at a fraction of B's token cost,
      and the 4 boundary examples are easier to maintain
      than 12. Catches what instructions miss without
      taking on the full drift surface of pure few-shot.

      What I'd ship: C. What I'd verify before locking:
      that the 4 examples cover the boundary cases the
      eval set surfaces (run Unit 4's layered eval on the
      hybrid before the 1-week prompt-lock deadline).
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
      flagged: false

  - id: p002
    label: All three met, system-prompt-led framing
    answer: |
      The contract-shape question matters more than the
      catch-rate spread between the three prototypes. Two
      axes here: where the contract lives (system vs user
      prompt) and how the contract is expressed
      (instructions vs examples).

      All three prototypes have the system-vs-user split
      right — transcript in user, contract in system. The
      load-bearing question is whether the contract on the
      system side is instruction-shaped (declarative rules)
      or example-shaped (demonstrative few-shot) or both.

      Pure instructions (A) work when the specification is
      clean. "Output JSON with these fields" is clean.
      "Identify the explicit assignee" is ambiguous-
      criteria — explicit by what standard? — and that
      ambiguity is what produces the 8% owner-
      hallucination rate. Pure few-shot (B) covers the
      ambiguity (88% catch, 3% hallucination) but pays
      with 12 transcripts of system-prompt overhead and a
      maintenance cadence that breaks when meeting style
      shifts. The hybrid (C) is the right default here:
      keep the clean rules as instructions (output schema,
      required fields), add 3-5 examples for the
      ambiguous-criteria part (what counts as an explicit
      assignee).

      Ship C. Verify the 4 examples cover the boundary
      cases the eval surfaces before the prompt-lock
      deadline. The 1-week timeline is tight but doable
      because C's example count is small enough to
      hand-curate.
