name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + unit-markdown linter)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foss101
          POSTGRES_PASSWORD: foss101
          POSTGRES_DB: foss101_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foss101 -d foss101_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://foss101:foss101@localhost:5432/foss101_test
        run: python -m pytest tests/

      - name: Lint authored units
        run: python -m backend.scripts.lint_unit_markdown content/units/

      - name: Validate unit ingest (--check, no DB writes)
        run: python -m backend.scripts.ingest_units --check content/units/

  android:
    name: Android (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
